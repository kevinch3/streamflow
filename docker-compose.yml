services:
  mediamtx:
    image: docker.io/bluenviron/mediamtx:latest-ffmpeg
    ports:
      - "1935:1935"   # RTMP ingest
      - "8888:8888"   # HLS playback
      - "8889:8889"   # WebRTC WHIP/WHEP signaling
      - "8189:8189/udp"  # WebRTC ICE UDP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9997/v3/config/global/get"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    # Port not exposed directly — nginx handles TLS and proxies to app:80
    volumes:
      - ./app:/app/app
      - /app/app/node_modules
      - ./html:/app/html
    env_file:
      - .env
    environment:
      - MEDIAMTX_API=http://mediamtx:9997
    depends_on:
      mediamtx:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
