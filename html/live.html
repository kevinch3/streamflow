<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamFlow — Live Streams</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<header class="h-14 flex items-center justify-between px-6 bg-sf-surface border-b border-sf-surface-2 gap-3">
  <div class="text-lg font-bold tracking-tight">
    Stream<span class="text-sf-accent">Flow</span>
    <span class="font-normal text-sm text-sf-subtle">Live</span>
  </div>
  <div class="flex items-center gap-3.5">
    <span class="text-[13px] text-sf-subtle" id="streamCount"></span>
    <div class="flex items-center gap-2 text-[13px] text-sf-muted">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <a class="btn btn-ghost" href="/">Dashboard</a>
  </div>
</header>

<main class="max-w-[1100px] mx-auto py-7 px-6">
  <div id="streamsList">
    <div class="empty-state">
      <strong>No live streams</strong>
      <p>Streams will appear here automatically when someone goes live.</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"
        integrity="sha256-QTqD4rsMd+0L8L4QXVOdF+9F39mEoLE+zTsUqQE4OTg="
        crossorigin="anonymous"></script>
<script src="/js/common.js"></script>
<script src="/js/live.js"></script>
</body>
</html>
