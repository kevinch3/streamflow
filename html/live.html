<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamFlow — Live Streams</title>
    <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/live.css" />
</head>
<body>
<header>
  <div class="logo">Stream<span>Flow</span> <span style="font-weight:400;font-size:14px;color:#64748b">Live</span></div>
  <div class="header-right">
    <span class="stream-count" id="streamCount"></span>
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <a class="btn btn-ghost" href="/">Dashboard</a>
  </div>
</header>

<main>
  <div id="streamsList">
    <div class="empty-state">
      <strong>No live streams</strong>
      <p>Streams will appear here automatically when someone goes live.</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"
        integrity="sha256-QTqD4rsMd+0L8L4QXVOdF+9F39mEoLE+zTsUqQE4OTg="
        crossorigin="anonymous"></script>
<script src="/js/common.js"></script>
<script src="/js/live.js"></script>
</body>
</html>
