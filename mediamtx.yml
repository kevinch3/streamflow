logLevel: info

# Authentication — allow anyone without credentials (single-tenant prototype)
authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback

# Disable unused protocols
rtsp: no
webrtc: no
srt: no

# REST API (internal — only Express accesses this)
api: yes
apiAddress: :9997

# RTMP ingest
rtmp: yes
rtmpAddress: :1935

# HLS output
hls: yes
hlsAddress: :8888
hlsVariant: mpegts
hlsAlwaysRemux: yes
hlsSegmentDuration: 2s
hlsSegmentCount: 3
hlsAllowOrigins:
  - '*'

# Accept any stream path (wildcard)
paths:
  all_others:
