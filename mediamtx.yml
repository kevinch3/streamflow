logLevel: info

# Authentication — strict publish auth via StreamFlow callback
# NOTE: authHTTPAddress is set via MTX_AUTHHTTPADDRESS env var in docker-compose.yml
# because MediaMTX v1.16 does not expand ${VAR} in config files.
authMethod: http
authHTTPExclude:
  - action: api
  - action: read
  - action: playback

# Disable unused protocols
rtsp: no
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
srt: no

# REST API (internal — only Express accesses this)
api: yes
apiAddress: :9997

# RTMP ingest
rtmp: yes
rtmpAddress: :1935

# HLS output
hls: yes
hlsAddress: :8888
hlsVariant: fmp4
hlsAlwaysRemux: yes
hlsSegmentDuration: 2s
hlsSegmentCount: 3
hlsAllowOrigins:
  - '*'

# Accept any stream path (wildcard)
paths:
  all_others:
