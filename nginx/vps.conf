# StreamFlow VPS nginx config
# Deployed by scripts/setup-vps.sh — substitutes YOUR_DOMAIN and LOCAL_MACHINE_NAME via sed.
#
# Requires nginx-full (includes ngx_stream_core_module for TCP proxying):
#   apt install nginx-full
#
# Upstream: the local machine running StreamFlow, reachable via Tailscale MagicDNS.

# TCP proxy — RTMP ingest and HLS playback forwarded to local machine
stream {
    upstream rtmp_backend {
        server LOCAL_MACHINE_NAME:1935;
    }
    upstream hls_backend {
        server LOCAL_MACHINE_NAME:8888;
    }

    server {
        listen 1935;
        proxy_pass rtmp_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 600s;   # live streams can run for hours
    }

    server {
        listen 8888;
        proxy_pass hls_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
    }
}

# HTTP/HTTPS — dashboard + API + SSE
http {
    server {
        listen 80;
        listen [::]:80;
        server_name YOUR_DOMAIN;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        location /whip/ {
            proxy_pass http://LOCAL_MACHINE_NAME:8889/;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass         http://LOCAL_MACHINE_NAME:80;
            proxy_http_version 1.1;

            # SSE requires: no buffering, long timeout, keep-alive connection
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;   # nginx default (60s) drops SSE connections
            proxy_set_header   Connection        '';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
